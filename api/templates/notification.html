<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <style>
    body { margin: 0; padding: 0; background-color: #f5f5f5; }
    table, td { border-collapse: collapse; }
    img { border: 0; max-width: 100%; }
    p { margin: 0; padding-bottom: 1em; }
    a { color: #D99D71; text-decoration: none; }
  </style>
</head>
<body>
  <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f5f5f5;padding:20px 0;">
    <tbody>
      <tr>
        <td>
          <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" style="background-color:#ffffff;border-radius:4px;overflow:hidden;">
            <tbody>

              <!-- Header -->
              <tr>
                <td style="background-color:#000000;padding:20px;text-align:center;">
                  <a href="https://cro.ma">
                    <img alt="Cro.ma" src="https://cro.ma/upwork/croma_logo_design_email.png" width="130" style="display:block;margin:0 auto;" />
                  </a>
                </td>
              </tr>

              <!-- Title -->
              <tr>
                <td style="padding:30px 40px 10px 40px;text-align:center;font-family:Helvetica,Arial,sans-serif;">
                  <h1 style="margin:0 0 10px 0;font-size:24px;color:#000000;">New Contact Form Submission</h1>
                  <p style="font-size:16px;color:#666666;">You have received a new message from your website.</p>
                </td>
              </tr>

              <!-- Details Table -->
              <tr>
                <td style="padding:10px 40px 30px 40px;">
                  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f5f5f5;border-radius:4px;">
                    <tbody>
                      <tr>
                        <td style="padding:15px 20px;border-top:solid 1px #D9D9D9;font-family:Helvetica,Arial,sans-serif;font-size:16px;font-weight:bold;color:#3B3939;width:30%;">Name</td>
                        <td style="padding:15px 20px;border-top:solid 1px #D9D9D9;font-family:Helvetica,Arial,sans-serif;font-size:16px;color:#3B3939;">{{NAME}}</td>
                      </tr>
                      <tr>
                        <td style="padding:15px 20px;border-top:solid 1px #D9D9D9;font-family:Helvetica,Arial,sans-serif;font-size:16px;font-weight:bold;color:#3B3939;">Email</td>
                        <td style="padding:15px 20px;border-top:solid 1px #D9D9D9;font-family:Helvetica,Arial,sans-serif;font-size:16px;color:#3B3939;"><a href="mailto:{{EMAIL}}">{{EMAIL}}</a></td>
                      </tr>
                      <tr>
                        <td style="padding:15px 20px;border-top:solid 1px #D9D9D9;font-family:Helvetica,Arial,sans-serif;font-size:16px;font-weight:bold;color:#3B3939;">Phone</td>
                        <td style="padding:15px 20px;border-top:solid 1px #D9D9D9;font-family:Helvetica,Arial,sans-serif;font-size:16px;color:#3B3939;"><a href="tel:{{PHONE}}">{{PHONE}}</a></td>
                      </tr>
                      <tr>
                        <td style="padding:15px 20px;border-top:solid 1px #D9D9D9;font-family:Helvetica,Arial,sans-serif;font-size:16px;font-weight:bold;color:#3B3939;vertical-align:top;">Message</td>
                        <td style="padding:15px 20px;border-top:solid 1px #D9D9D9;font-family:Helvetica,Arial,sans-serif;font-size:16px;color:#3B3939;line-height:1.6;">{{MESSAGE}}</td>
                      </tr>
                    </tbody>
                  </table>
                </td>
              </tr>

              <!-- Footer -->
              <tr>
                <td style="background-color:#000000;padding:18px;text-align:center;font-family:Helvetica,Arial,sans-serif;font-size:14px;color:#ffffff;">
                  <p style="padding-bottom:0;">AJ Kotze &mdash; Johannesburg, South Africa</p>
                </td>
              </tr>

            </tbody>
          </table>
        </td>
      </tr>
    </tbody>
  </table>
</body>
</html>
